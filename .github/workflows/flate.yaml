---
name: Flate

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
    paths:
      - cluster/**.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: cluster/**/*

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@v7
        with:
          path: pull
          persist-credentials: false
          sparse-checkout: |
            cluster/

      - name: Checkout Default Branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: default
          persist-credentials: false
          sparse-checkout: |
            cluster/

      - name: Setup Mise
        uses: jdx/mise-action@v4
        with:
          cache: false
          tool_versions: |
            github:home-operations/flate latest

      - name: Suspend private other resources
        run: |
          if [ -d "./pull/cluster/apps/other" ]; then
            yq eval -i '.spec.suspend = true' ./pull/cluster/apps/other/ks.yaml
            yq eval -i '.spec.suspend = true' ./pull/cluster/apps/other/gitrepo.yaml
          fi
          if [ -d "./default/cluster/apps/other" ]; then
            yq eval -i '.spec.suspend = true' ./default/cluster/apps/other/ks.yaml
            yq eval -i '.spec.suspend = true' ./default/cluster/apps/other/gitrepo.yaml
          fi

      - name: Run flate test
        env:
          KIND: ${{ matrix.kind }}
        run: flate test "$KIND" --path ./pull --path-orig ./default

      - name: Run flate diff
        id: diff
        env:
          KIND: ${{ matrix.kind }}
        run: |
          {
            echo 'diff<<EOF'
            flate diff "$KIND" --path ./pull --path-orig ./default
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - if: ${{ steps.diff.outputs.diff != '' }}
        name: Add or Update Comment
        uses: actions/github-script@v9
        env:
          DIFF: ${{ steps.diff.outputs.diff }}
          KIND: ${{ matrix.kind }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { DIFF, KIND } = process.env;
            const label = { helmrelease: "HelmRelease", kustomization: "Kustomization" }[KIND];
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = `<!-- Sticky Pull Request Comment${issue_number}/cluster/${KIND} -->`;
            const body = [
              marker,
              `<details open><summary>${label} diff</summary>`,
              ``,
              "```diff",
              DIFF,
              "```",
              ``,
              `</details>`,
              ``,
              `<sub>[Workflow run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})</sub>`,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  success:
    if: ${{ !cancelled() }}
    needs:
      - flate
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
clusterName: k8s
talosVersion: v1.13.2
kubernetesVersion: v1.36.1
endpoint: https://${clusterEndpointIP}:6443

additionalApiServerCertSans: &sans
  - k8s.home
  - ${clusterEndpointIP}
  - 127.0.0.1
  - 10.0.10.201

additionalMachineCertSans: *sans

domain: cluster.local

cniConfig:
  name: none

nodes:
  - hostname: node1.home
    controlPlane: true
    ipAddress: 10.0.1.51
    disableSearchDomain: true
    nameservers:
      - 10.0.0.1
      - 10.0.1.1
    installDiskSelector:
      model: KINGSTON OM8PGP41024N-A0
    networkInterfaces:
      - interface: bond0
        addresses:
          - 10.0.1.51/23
        dhcp: false
        mtu: 9000
        bond:
          interfaces:
            - enp2s0f0np0
            - enp2s0f1np1
          mode: 802.3ad
          xmitHashPolicy: layer3+4
          lacpRate: fast
          miimon: 100
          updelay: 200
          downdelay: 200
        routes:
          - network: 0.0.0.0/0
            gateway: 10.0.0.1
      - interface: lo
        addresses:
          - 10.0.10.99/32
    nodeLabels:
      node.home.arpa/physical: "true"
      node-role.kubernetes.io/control-plane: ""
    nodeAnnotations:
      installerImage: "{{ .MachineConfig.MachineInstall.InstallImage }}"
    # userVolumes:
    #   - name: openebs-data
    #     provisioning:
    #       diskSelector:
    #         match: "system_disk"
    #       minSize: 100GiB
    #       maxSize: 100GiB
    patches:
      - |-
        apiVersion: v1alpha1
        kind: VolumeConfig
        name: EPHEMERAL
        provisioning:
          minSize: 100GiB
          grow: true
      - |-
        apiVersion: v1alpha1
        kind: RawVolumeConfig
        name: rook-vol
        provisioning:
          diskSelector:
            match: "system_disk"
          minSize: 600GiB
          maxSize: 600GiB


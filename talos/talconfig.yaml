  #           - 50000
  #         protocol: tcp
  #       ingress: &localnet
  #         - subnet: 10.0.0.0/23
  #         - subnet: 192.168.100.0/24
  #     - name: trustd-ingress
  #       portSelector:
  #         ports:
  #           - 50001
  #         protocol: tcp
  #       ingress:
  #         - subnet: ${CLUSTER_SUBNET}
  #     - name: kubernetes-api-ingress
  #       portSelector:
  #         ports:
  #           - 6443
  #         protocol: tcp
  #       ingress: *localnet
  #     - name: etcd-ingress
  #       portSelector:
  #         ports:
  #           - 2379-2380
  #         protocol: tcp
  #       ingress:
  #         - subnet: $CONTROL1/32
  #         - subnet: $CONTROL2/32
  #         - subnet: $CONTROL3/32

  patches:
    # Enable thunderbolt + net
    - |-
      machine:
        kernel:
          modules:
            - name: nbd

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:etcd:backup
              - os:admin
            allowedKubernetesNamespaces:
              - backups
              - system-upgrade

    # Cluster Configuration
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        apiServer:
          # disable default API server admission plugins
          admissionControl:
            $$patch: delete
          extraArgs:
            # https://kubernetes.io/docs/tasks/extend-kubernetes/configure-aggregation-layer/
            enable-aggregator-routing: true
            # Enable mutating admission policy
            feature-gates: MutatingAdmissionPolicy=true
            runtime-config: admissionregistration.k8s.io/v1beta1=true
            # https://pocket-id.org/docs/client-examples/talos
            oidc-client-id: 287821e5-f31e-4073-9b2c-c30775e9fee6
            oidc-issuer-url: https://id.${SECRET_DOMAIN}
            oidc-username-claim: email
            oidc-extra-scope: groups
            oidc-groups-prefix: "oidc:"
          resources:
            requests:
              cpu: 400m
              memory: 1.5G
            limits:
              # cpu: 2
              memory: 4G
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              # cpu: 150m
              memory: 400Mi
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
            auto-compaction-mode: periodic
            auto-compaction-retention: 30m
        proxy:
          disabled: true
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              # cpu: 150m
              memory: 100Mi

    # Spegel
    - |
      cluster:
        scheduler:
          config:
            apiVersion: kubescheduler.config.k8s.io/v1
            kind: KubeSchedulerConfiguration
            profiles:
              - schedulerName: default-scheduler
                plugins:
                  score:
                    disabled:
                      - name: ImageLocality
                pluginConfig:
                  - name: PodTopologySpread
                    args:
                      defaultingType: List
                      defaultConstraints:
                        - maxSkew: 1
                          topologyKey: kubernetes.io/hostname
                          whenUnsatisfiable: ScheduleAnyway

    # CRD configuration
    - |-
      cluster:
        extraManifests:
          - https://github.com/prometheus-operator/prometheus-operator/releases/download/${promVersion}/stripped-down-crds.yaml
          - https://github.com/kubernetes-sigs/gateway-api/releases/download/${gatewayApiVersion}/standard-install.yaml
          - https://raw.githubusercontent.com/kubernetes-sigs/external-dns/refs/tags/${externalDNSVersion}/config/crd/standard/dnsendpoints.externaldns.k8s.io.yaml

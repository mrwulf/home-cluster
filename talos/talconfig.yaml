patches:
  - |-
    machine:
      features:
        kubePrism:
          enabled: true
          port: 7445
        hostDNS:
          enabled: true
          # Incompatible with Cilium bpf masquerade. https://github.com/siderolabs/talos/issues/8836
          forwardKubeDNSToHost: false
          resolveMemberNames: true
      files:
        # configure containerd for spegel
        - content: |
            [plugins."io.containerd.cri.v1.images"]
              discard_unpacked_layers = false
          path: /etc/cri/conf.d/20-customization.part
          permissions: 0o644
          op: create

        # Configure nfs mount options
        - op: overwrite
          path: /etc/nfsmount.conf
          permissions: 0o644
          content: |
            [ NFSMount_Global_Options ]
            hard=True
            noatime=True
            nodiratime=True
            rsize=131072
            wsize=131072
            nconnect=16
      kubelet:
        extraArgs:
          rotate-server-certificates: true
          max-pods: 150
        extraConfig:
          imageGCLowThresholdPercent: 60
          imageGCHighThresholdPercent: 70
          maxParallelImagePulls: 10
          serializeImagePulls: false
          shutdownGracePeriod: 60s
          shutdownGracePeriodCriticalPods: 30s
        extraMounts:
          # Mount openebs-hostpath in kubelet
          - destination: /var/mnt/extra
            type: bind
            source: /var/mnt/extra
            options:
              - rbind
              - rshared
              - rw
      logging:
        destinations:
          - endpoint: "udp://vector-aggregator.monitoring.svc.cluster.local:6051/"
            format: json_lines
      sysctls:
        fs.inotify.max_user_watches: "1048576"
        fs.inotify.max_user_instances: "8192"
        net.core.somaxconn: "65535"
        net.core.rmem_max: 67108864            # Cloudflared / QUIC
        net.core.wmem_max: 67108864            # Cloudflared / QUIC
        net.ipv4.tcp_fastopen: 3               # TCP Fast Open
        net.ipv4.tcp_mtu_probing: 1            # Jumbo frames
        net.ipv4.tcp_congestion_control: bbr   # 10Gb/s
        net.core.default_qdisc: fq             # 10Gb/s
        net.ipv4.tcp_rmem: 4096 87380 33554432 # 10Gb/s
        net.ipv4.tcp_wmem: 4096 65536 33554432 # 10Gb/s
        net.ipv4.tcp_window_scaling: 1         # 10Gb/s
        vm.nr_hugepages: 1024                  # Postgres
        net.ipv4.conf.all.arp_ignore: "1"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.conf.default.arp_ignore: "1"
        net.ipv4.conf.default.arp_announce: "2"
      sysfs:
        devices.system.cpu.intel_pstate.hwp_dynamic_boost: 1
      time:
        disabled: false
        servers:
          - 10.0.0.1
          - 10.0.1.1
      udev:
        rules:
          # Intel GPU
          - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
          # Transmit queue length
          - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tap*", ATTR{tx_queue_len}="10000"
          - SUBSYSTEM=="net", ACTION=="add", KERNEL=="tun*", ATTR{tx_queue_len}="10000"
          # set all disks to `none` scheduler (optimal setting for Ceph and ZFS)
          - SUBSYSTEM=="block", ENV{DEVTYPE}=="disk", ATTR{queue/scheduler}="none"
worker:
  schematic: &schematic
    customization:
      extraKernelArgs:
        - talos.logging.kernel=udp://vector-aggregator.monitoring.svc.cluster.local:6050/ # Logging
        - talos.auditd.disabled=1 # Less security, faster computer
        - mitigations=off # Less security, faster computer
        - apparmor=0 # Less security, faster computer
        - security=none # Less security, faster computer
        - init_on_alloc=0 # Less security, faster computer
        - init_on_free=0 # Less security, faster computer
        - intel_iommu=on # PCI Passthrough
        - iommu=pt # PCI Passthrough
      systemExtensions:
        officialExtensions:
          - siderolabs/intel-ucode
          - siderolabs/i915
          - siderolabs/lldpd
          - siderolabs/gasket-driver
          - siderolabs/mei
  extensionServices: &extensionServices
    - name: lldpd
      configFiles:
        - content: |
            configure lldp portidsubtype ifname
            configure system description "Talos Node"
            configure system bond-slave-src-mac-type real
            configure system ip management pattern bond0,en*,eth*
            configure system interface pattern bond*,en*,eth*
          mountPath: /usr/local/etc/lldpd/lldpd.conf

controlPlane:
  schematic: *schematic
  extensionServices: *extensionServices
  # ingressFirewall:
  #   defaultAction: block
  #   rules:
  #     - name: kubelet-ingress
  #       portSelector:
  #         ports:
  #           - 10250
  #         protocol: tcp
  #       ingress:
  #         - subnet: ${CLUSTER_SUBNET}
  #     - name: apid-ingress
  #       portSelector:

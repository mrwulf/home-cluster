---
serviceMonitor:
  create: true
web:
  config:
    authentication:
      type: Anonymous
      anonymous:
        username: flux
        groups:
          - flux-admin
  rbac:
    createRoles: true
  networkPolicy:
    create: false
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.middlewares: "networking-rfc1918-ips@kubernetescrd"
      hajimari.io/enable: "true"
    hosts:
      - host: &host "flux-ui.home.${SECRET_DOMAIN}"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "wildcard-internal-${SECRET_DOMAIN/./-}-tls"
        hosts:
          - *host

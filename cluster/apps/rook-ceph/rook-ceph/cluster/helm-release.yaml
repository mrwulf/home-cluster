---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: rook-ceph-cluster
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: v1.20.1
  url: oci://ghcr.io/rook/rook-ceph-cluster
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    monitoring:
      enabled: true
      createPrometheusRules: true
    toolbox:
      enabled: true
    cephClusterSpec:
      cephConfig:
        global:
          bdev_enable_discard: "true"
          bdev_async_discard_threads: "1"
          mon clock drift allowed: "0.8"
        osd:
          osd_mclock_profile: "high_recovery_ops"
          bluestore_slow_ops_warn_lifetime: "300"
          # bluestore_slow_ops_warn_threshold: "10"
          # osd_op_complaint_time: "60.0"
        mgr:
          mgr/dashboard/grafana_api_url: "http://grafana-service.monitoring.svc.cluster.local:3000"
          mgr/dashboard/grafana_api_ssl_verify: "false"
          mgr/dashboard/grafana_frontend_api_url: "https://grafana.home.${SECRET_DOMAIN}"
      crashCollector:
        disable: false
      csi:
        readAffinity:
          enabled: true
          crushLocationLabels: ["kubernetes.io/hostname"]
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: "http://vmsingle-stack.monitoring.svc.cluster.local:8428"
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
      network:
        provider: host
        addressRanges:
          public: ["10.0.1.0/24"]
          cluster:
            ["10.0.1.51/32", "10.0.1.52/32", "10.0.1.53/32", "10.0.1.55/32"]
        connections:
          requireMsgr2: true
      resources:
        api:
          requests:
            cpu: "100m"
            memory: "100Mi"
        mgr:
          requests:
            cpu: "100m"
            memory: "100Mi"
        mon:
          requests:
            cpu: "100m"
            memory: "100Mi"
        osd:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            memory: "8Gi"
      storage:
        useAllNodes: false
        useAllDevices: false
        # Use the following command to get the device name by-id:
        #   talosctl ls /dev/disk/by-id -n <node-ip>
        #   talosctl -n <node-ip> get volumestatus r-rook-vol -oyaml
        nodes:
          # node1 (10.0.1.51) — Kingston NVMe is the OS disk; r-rook-vol is 644 GB raw
          - name: "node1"
            devices:
              - name: "/dev/disk/by-partlabel/r-rook-vol"
              - name: "/dev/disk/by-id/nvme-Samsung_SSD_970_EVO_Plus_1TB_S6S1NJ0TB02681R"
          # node2 (10.0.1.52) — Kingston NVMe is the OS disk; r-rook-vol is 644 GB raw
          - name: "node2"
            devices:
              - name: "/dev/disk/by-partlabel/r-rook-vol"
              - name: "/dev/disk/by-id/nvme-Samsung_SSD_980_PRO_1TB_S5P2NL0W811711P"
          # node3 (10.0.1.53) — Kingston NVMe is the OS disk; r-rook-vol is 644 GB raw
          - name: "node3"
            devices:
              - name: "/dev/disk/by-partlabel/r-rook-vol"
              - name: "/dev/disk/by-id/nvme-T-FORCE_TM8FP7001T_TPBF2404260090101808"
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
          enableRBDStats: true
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          mountOptions: ["discard"]
          parameters:
            imageFormat: "2"
            imageFeatures: layering,exclusive-lock,object-map,fast-diff,deep-flatten
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-block
      isDefault: true
      deletionPolicy: Delete
    cephFileSystems:
      - name: ceph-filesystem
        spec:
          metadataPool:
            replicated:
              size: 3
          dataPools:
            - failureDomain: host
              replicated:
                size: 3
              name: data0
          metadataServer:
            activeCount: 1
            activeStandby: true
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
        storageClass:
          enabled: true
          isDefault: false
          name: ceph-filesystem
          pool: data0
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            # Talos does not ship the ceph kernel module; use FUSE client instead
            mounter: fuse
    cephObjectStores: []

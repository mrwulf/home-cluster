---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pocket-id-instance
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  allowCrossNamespaceImport: true
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
  json: >
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "schemaVersion": 39,
      "tags": ["pocket-id"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "Pocket ID Instance",
      "uid": "pocket-id-instance",
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(rate(http_server_duration_seconds_count{job=\"pocket-id\"}[5m])) or sum(rate(http_server_duration_count{job=\"pocket-id\"}[5m])) or sum(rate(http_server_duration_milliseconds_count{job=\"pocket-id\"}[5m]))",
              "legendFormat": "requests/s",
              "refId": "A"
            }
          ]
        },
        {
          "title": "P95 Request Latency",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "ms" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "(histogram_quantile(0.95, sum(rate(http_server_duration_seconds_bucket{job=\"pocket-id\"}[5m])) by (le)) * 1000) or histogram_quantile(0.95, sum(rate(http_server_duration_milliseconds_bucket{job=\"pocket-id\"}[5m])) by (le)) or histogram_quantile(0.95, sum(rate(http_server_duration_bucket{job=\"pocket-id\"}[5m])) by (le))",
              "legendFormat": "P95 Latency",
              "refId": "A"
            }
          ]
        },
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "percentunit" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "rate(process_cpu_seconds_total{job=\"pocket-id\"}[5m])",
              "legendFormat": "CPU",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Memory Usage (Resident)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "process_resident_memory_bytes{job=\"pocket-id\"}",
              "legendFormat": "Resident Memory",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Go Goroutines",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "go_goroutines{job=\"pocket-id\"}",
              "legendFormat": "Goroutines",
              "refId": "A"
            }
          ]
        }
      ]
    }

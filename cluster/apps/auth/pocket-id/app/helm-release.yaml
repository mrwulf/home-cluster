---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: pocket-id-operator
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    operator:
      replicas: 2
      resources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 64Mi
    instance:
      enabled: true
      name: pocket-id
      spec:
        # renovate: depName=pocket-id/pocket-id datasource=github-releases
        image: ghcr.io/pocket-id/pocket-id:v2.8.0
        encryptionKey:
          valueFrom:
            secretKeyRef:
              name: pocket-id-secret
              key: ENCRYPTION_KEY
        databaseUrl:
          valueFrom:
            secretKeyRef:
              name: pocket-id-secret
              key: DATABASE_URL
        fileBackend: database
        appUrl: "https://id.${SECRET_DOMAIN}"
        emailNotifications:
          verification: true
          oneTimeAccessAsAdmin: true
          oneTimeAccessAsUnauthenticated: true
        smtp:
          host: smtp-relay.system.svc.cluster.local
          port: 2525
          from: pocket-id@${SECRET_DOMAIN}
          tls: none
        persistence:
          enabled: false
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
        podTemplate:
          spec:
            initContainers:
              - name: init-db
                image: ghcr.io/home-operations/postgres-init:18.4
                env:
                  - name: INIT_POSTGRES_HOST
                    value: postgres16-rw.databases.svc.cluster.local.
                  - name: INIT_POSTGRES_DBNAME
                    value: pocketid
                  - name: INIT_POSTGRES_SUPER_PASS
                    valueFrom:
                      secretKeyRef:
                        name: postgres-superuser
                        key: password
                  - name: INIT_POSTGRES_SUPER_USER
                    valueFrom:
                      secretKeyRef:
                        name: postgres-superuser
                        key: username
                  - name: INIT_POSTGRES_USER
                    value: pocketid
                  - name: INIT_POSTGRES_PASS
                    valueFrom:
                      secretKeyRef:
                        name: pocket-id-secret
                        key: DB_PASS

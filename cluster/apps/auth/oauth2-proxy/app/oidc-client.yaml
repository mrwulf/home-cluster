---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: oauth2-proxy
spec:
  name: OAuth2 Proxy
  clientID: c6c0b4d2-7e1a-4c9f-8d2b-6f8a3c9e1b7d
  callbackUrls:
    - https://oauth.${SECRET_DOMAIN}/oauth2/callback
  allowedUserGroups:
    - name: household-users
      namespace: auth
  secret:
    name: oauth2-proxy-oidc-credentials
    keys:
      clientID: OAUTH2_PROXY_CLIENT_ID
      clientSecret: OAUTH2_PROXY_CLIENT_SECRET
      issuerUrl: OAUTH2_PROXY_OIDC_ISSUER_URL

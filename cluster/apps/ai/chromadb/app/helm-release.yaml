# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app chromadb
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      chromadb:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              repository: docker.io/chromadb/chroma
              tag: 0.6.3
            env:
              ANONYMIZED_TELEMETRY: "False"
              IS_PERSISTENT: "TRUE"
              PERSISTENT_DATA_KEEP_SINGLE_FILE: "TRUE"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: chromadb
        ports:
          http:
            port: 8000

    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /chroma/chroma

# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app odysseus
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      odysseus:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              repository: ghcr.io/pewdiepie-archdaemon/odysseus
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              HOSTNAME: "0.0.0.0"
              HOST: "0.0.0.0"
              APP_BIND: "0.0.0.0"
              PORT: &port 7000
              APP_PORT: *port
              ODYSSEUS_ADMIN_USER: "admin"
              OLLAMA_BASE_URL: "http://ollama.ai.svc.cluster.local:11434"
              SEARXNG_URL: "http://searxng.ai.svc.cluster.local:8080"
              NTFY_URL: "http://ntfy.ai.svc.cluster.local:80"
              CHROMADB_HOST: "chromadb.ai.svc.cluster.local"
              CHROMADB_PORT: "8000"
              CHROMADB_URL: "http://chromadb.ai.svc.cluster.local:8000"
              DATABASE_URL: "sqlite:////app/data/app.db"
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 2.5Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        enabled: true
        parentRefs:
          - name: internal-gateway
            namespace: networking
        hostnames:
          - "odysseus.home.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/data

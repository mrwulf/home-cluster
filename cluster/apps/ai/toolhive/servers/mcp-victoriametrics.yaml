---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-victoriametrics
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=ghcr.io/victoriametrics/mcp-victoriametrics datasource=docker
  image: ghcr.io/victoriametrics/mcp-victoriametrics:v1.120.1@sha256:16d9a30a6629319a8e84a73b9b54e1e9b9e5bf229bc40a7f1717c8602b0c1c09
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  env:
    - name: VM_INSTANCE_ENTRYPOINT
      value: http://vmsingle-stack.monitoring.svc.cluster.local:8428
    - name: VM_INSTANCE_TYPE
      value: single
    - name: MCP_LOG_LEVEL
      value: error
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"

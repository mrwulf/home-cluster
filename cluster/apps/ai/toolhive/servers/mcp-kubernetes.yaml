---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-kubernetes
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-kubernetes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: mcp-kubernetes
    namespace: ai
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-kubernetes
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=mcp/kubernetes datasource=docker
  image: mcp/kubernetes:latest@sha256:bc47271be7b8a49c151e04ed06f2b3fdb4e2a28629e7cace76b18669a430f3f0
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  serviceAccount: mcp-kubernetes
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"

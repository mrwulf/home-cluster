---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-kubernetes
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-kubernetes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: mcp-kubernetes
    namespace: ai
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-kubernetes
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=mcp/kubernetes datasource=docker
  image: mcp/kubernetes:latest@sha256:5ffbf7f0a8aa7a58dfcf8d34807fd42a9cd7d88d88a5de88f472edfc3133af73
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  serviceAccount: mcp-kubernetes
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"

---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-github
spec:
  # renovate: depName=ghcr.io/github/github-mcp-server datasource=docker
  image: ghcr.io/github/github-mcp-server:v0.1.0
  transport: sse
  env:
    - name: GITHUB_PERSONAL_ACCESS_TOKEN
      value: "${GITHUB_TOKEN}"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

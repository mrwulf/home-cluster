---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-memory
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=ghcr.io/bjw-s-labs/mcp-memory datasource=docker
  image: ghcr.io/bjw-s-labs/mcp-memory:2026.7.4@sha256:78487a16681b91102197e9b7915f950a148e94ff1ce6356707d3ff6ef6516ae7
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"

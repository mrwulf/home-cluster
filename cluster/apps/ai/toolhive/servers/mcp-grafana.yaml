---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-grafana
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=docker.io/grafana/mcp-grafana datasource=docker
  image: docker.io/grafana/mcp-grafana:v0.17.0@sha256:da49d967b72ebb4d08617295ef196b53b3294a9c1d484775dd3315190a166c55
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  args:
    - "-t"
    - "stdio"
  env:
    - name: GRAFANA_URL
      value: http://grafana-service.monitoring.svc.cluster.local:3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-github-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: mcp-github-secret
    template:
      data:
        GITHUB_TOKEN: "{{ .github_token }}"
  refreshInterval: 15m
  data:
    - secretKey: github_token
      remoteRef:
        key: "${BW_GITHUB}"
        property: "flux-notifier-apikey"

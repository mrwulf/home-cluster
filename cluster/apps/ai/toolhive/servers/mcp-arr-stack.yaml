---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-arr-stack
spec:
  # renovate: depName=ghcr.io/stacklok/toolhive/mcp-arr-stack datasource=docker
  image: ghcr.io/stacklok/toolhive/mcp-arr-stack:v0.1.0
  transport: sse
  env:
    - name: SONARR_API_KEY
      value: "${SONARR_APIKEY}"
    - name: RADARR_API_KEY
      value: "${RADARR_APIKEY}"
    - name: PROWLARR_API_KEY
      value: "${PROWLARR_APIKEY}"

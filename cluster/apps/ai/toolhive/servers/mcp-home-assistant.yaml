---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-home-assistant
spec:
  # renovate: depName=ghcr.io/homeassistant-ai/ha-mcp datasource=docker
  image: ghcr.io/homeassistant-ai/ha-mcp:2.3.1
  transport: streamable-http
  env:
    - name: HOMEASSISTANT_URL
      value: http://home-assistant.household.svc.cluster.local:8123
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - ha-mcp-web
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

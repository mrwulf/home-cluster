---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=docker.io/isokoliuk/mcp-searxng datasource=docker
  image: docker.io/isokoliuk/mcp-searxng:1.10.1@sha256:8704a6cdd73c416df0779e241e96b78414723640dfe492ab94fa9eb7b0cca6a8
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  env:
    - name: SEARXNG_URL
      value: http://searxng.ai.svc.cluster.local:8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"

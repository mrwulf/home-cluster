---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-searxng
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=docker.io/isokoliuk/mcp-searxng datasource=docker
  image: docker.io/isokoliuk/mcp-searxng:1.11.0@sha256:ec0ca986ea9dde137607c44335b2e96a8e6a4d7876dee36198f406c34b35cbe0
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  env:
    - name: SEARXNG_URL
      value: http://searxng.ai.svc.cluster.local:8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"

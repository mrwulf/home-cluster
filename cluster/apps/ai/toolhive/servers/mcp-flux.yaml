---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-flux
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-flux-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubectl-mcp-readonly
subjects:
  - kind: ServiceAccount
    name: mcp-flux
    namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-flux-write
rules:
  - apiGroups:
      - fluxcd.controlplane.io
      - helm.toolkit.fluxcd.io
      - image.toolkit.fluxcd.io
      - kustomize.toolkit.fluxcd.io
      - notification.toolkit.fluxcd.io
      - source.toolkit.fluxcd.io
    resources:
      - "*"
    verbs:
      - create
      - patch
      - update
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-flux-write
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-flux-write
subjects:
  - kind: ServiceAccount
    name: mcp-flux
    namespace: ai
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: mcp-flux
  namespace: ai
spec:
  groupRef:
    name: toolhive-servers
  # renovate: depName=ghcr.io/controlplaneio-fluxcd/flux-operator-mcp datasource=docker
  image: ghcr.io/controlplaneio-fluxcd/flux-operator-mcp:v0.52.0
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  serviceAccount: mcp-flux
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          args:
            - serve

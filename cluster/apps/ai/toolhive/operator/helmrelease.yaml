apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: toolhive-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: toolhive-operator
    namespace: flux-system
  dependsOn:
    - name: toolhive-operator-crds
  values:
    operator:
      rbac:
        scope: cluster
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        # CPU limits omitted per cluster rule #6
        limits:
          memory: 1Gi

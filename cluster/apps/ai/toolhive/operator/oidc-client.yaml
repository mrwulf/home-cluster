---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: toolhive
spec:
  name: ToolHive
  launchUrl: https://toolhive.home.${SECRET_DOMAIN}/
  callbackUrls:
    - https://toolhive.home.${SECRET_DOMAIN}/callback
  logoutCallbackUrls:
    - https://toolhive.home.${SECRET_DOMAIN}/
  allowedUserGroups:
    - name: admin
      namespace: auth
  secret:
    name: toolhive-oidc-credentials
    keys:
      clientID: client-id
      clientSecret: client-secret

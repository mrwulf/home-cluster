---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: toolhive
  annotations:
    gatus.io/enabled: "true"
spec:
  parentRefs:
    - name: internal-gateway
      namespace: networking
  hostnames:
    - "toolhive.home.${SECRET_DOMAIN}"
  rules:
    # Machine-client SSE/MCP endpoints - no OIDC, LAN-only
    - matches:
        - path:
            type: PathPrefix
            value: /sse
        - path:
            type: PathPrefix
            value: /sse/
        - path:
            type: PathPrefix
            value: /mcp
        - path:
            type: PathPrefix
            value: /mcp/
        - path:
            type: PathPrefix
            value: /message
        - path:
            type: PathPrefix
            value: /message/
        - path:
            type: PathPrefix
            value: /messages
        - path:
            type: PathPrefix
            value: /messages/
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rfc1918-ips
      backendRefs:
        - name: vmcp-toolhive-gateway
          port: 4483
    # Browser UI & all other paths - OIDC protected
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rfc1918-ips
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: traefik-middleware-chain-pocket-id
      backendRefs:
        - name: vmcp-toolhive-gateway
          port: 4483

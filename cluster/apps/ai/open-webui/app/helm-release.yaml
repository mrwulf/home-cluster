# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/rafaribe/postgres-init
              tag: 16
            envFrom:
              - secretRef:
                  name: openwebui
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.6
            env:
              # - name: GLOBAL_LOG_LEVEL
              #   value: DEBUG
              - name: OLLAMA_BASE_URL
                value: http://ollama.ai.svc.cluster.local:11434
              - name: WEBUI_URL
                value: "https://chat.${SECRET_DOMAIN}"
              - name: ENABLE_RAG_WEB_SEARCH
                value: true
              - name: RAG_WEB_SEARCH_ENGINE
                value: searxng
              - name: SEARXNG_QUERY_URL
                value: http://searxng.ai.svc.cluster.local:8080/search?q=<query>
              - name: ENABLE_OAUTH_SIGNUP
                value: "true"
              - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
                value: "true"
              - name: OAUTH_PROVIDER_NAME
                value: "Home PocketID"
              - name: OAUTH_SCOPES
                value: "openid profile email groups"
              - name: ENABLE_OAUTH_ROLE_MANAGEMENT
                value: "true"
              - name: OAUTH_ROLES_CLAIM
                value: "groups"
              - name: OAUTH_ADMIN_ROLES
                value: "admin"
            envFrom:
              - secretRef:
                  name: openwebui
              - secretRef:
                  name: openwebui-oidc-credentials
            resources:
              requests:
                cpu: 250m
                memory: 768Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: open-webui
        ports:
          http:
            port: 8080
    route:
      main:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
        parentRefs:
          - name: external-gateway
            namespace: networking
        hostnames:
          - "chat.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: traefik-middleware-chain-no-auth
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/backend/data

# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mariadb
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: volsync
  interval: 1h
  path: ./cluster/apps/mlm/mariadb/app
  components:
    - ../../../../templates/volsync/primary
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: mlm
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CLAIM: mariadb-data
      VOLSYNC_CAPACITY: 2Gi
      VOLSYNC_NFS_START_MINUTE: "42"
      VOLSYNC_B2_START_MINUTE: "07"
      APP_UID: "999"
      APP_GID: "999"
  retryInterval: 2m

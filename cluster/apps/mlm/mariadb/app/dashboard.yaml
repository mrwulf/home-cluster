---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: mariadb
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: mlm
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
  json: >
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "type": "datasource",
          "pluginId": "prometheus",
          "label": "Prometheus"
        }
      ],
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "schemaVersion": 39,
      "tags": ["mariadb", "mlm"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "MariaDB Metrics & Performance",
      "uid": "mariadb-mlm",
      "panels": [
        {
          "title": "MariaDB Active Connections",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "mysql_global_status_threads_connected{namespace=\"mlm\"}",
              "legendFormat": "connected threads",
              "refId": "A"
            }
          ]
        },
        {
          "title": "MariaDB Queries Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "rate(mysql_global_status_queries{namespace=\"mlm\"}[5m])",
              "legendFormat": "queries/s",
              "refId": "A"
            }
          ]
        }
      ]
    }

---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: wordpress
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: mlm
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
  json: >
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "type": "datasource",
          "pluginId": "prometheus",
          "label": "Prometheus"
        }
      ],
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "schemaVersion": 39,
      "tags": ["wordpress", "mlm"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "WordPress & MariaDB Stack",
      "uid": "wordpress-mlm",
      "panels": [
        {
          "title": "Pod Memory Working Set",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"mlm\", container!=\"\"})",
              "legendFormat": "{{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "cores" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (container) (node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace=\"mlm\", container!=\"\"})",
              "legendFormat": "{{container}}",
              "refId": "A"
            }
          ]
        }
      ]
    }

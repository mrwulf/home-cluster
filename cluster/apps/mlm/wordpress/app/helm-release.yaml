# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wordpress
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 33
            runAsGroup: 33
            fsGroup: 33
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          main:
            image:
              repository: docker.io/library/wordpress
              tag: 7.0.0-php8.3-apache
            env:
              WORDPRESS_DB_HOST: mariadb:3306
              WORDPRESS_CONFIG_EXTRA: |
                $GLOBALS['table_prefix'] = '4xvG3_';
                $table_prefix = '4xvG3_';
                if (isset($_SERVER['HTTP_CF_CONNECTING_IP'])) {
                    $_SERVER['REMOTE_ADDR'] = $_SERVER['HTTP_CF_CONNECTING_IP'];
                }
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                    $_SERVER['HTTPS'] = 'on';
                }
                if (isset($_SERVER['REQUEST_URI'])) {
                    $request_path = parse_url($_SERVER['REQUEST_URI'], PHP_URL_PATH);
                    if (strpos($request_path, '/server-status') === 0) {
                        $ht = '/var/www/html/.htaccess';
                        if (file_exists($ht) && strpos(file_get_contents($ht), 'server-status') === false) {
                            $c = file_get_contents($ht);
                            $u = str_replace("RewriteRule ^index\\.php$ - [L]", "RewriteRule ^index\\.php$ - [L]\nRewriteCond %{REQUEST_URI} !^/server-status", $c);
                            @file_put_contents($ht, $u);
                        }
                        return;
                    }
                    if ($request_path === '/' || $request_path === '/index.html') {
                        if (file_exists('/var/www/static/index.html')) {
                            header('Content-Type: text/html; charset=UTF-8');
                            readfile('/var/www/static/index.html');
                            exit;
                        }
                    } else {
                        $static_file = '/var/www/static' . $request_path;
                        if (file_exists($static_file) && !is_dir($static_file)) {
                            $ext = pathinfo($static_file, PATHINFO_EXTENSION);
                            $mimetypes = [
                                'css' => 'text/css',
                                'js' => 'application/javascript',
                                'jpg' => 'image/jpeg',
                                'jpeg' => 'image/jpeg',
                                'png' => 'image/png',
                                'gif' => 'image/gif',
                                'svg' => 'image/svg+xml',
                                'ico' => 'image/x-icon',
                                'html' => 'text/html',
                                'xml' => 'application/xml'
                            ];
                            $content_type = isset($mimetypes[$ext]) ? $mimetypes[$ext] : (mime_content_type($static_file) ?: 'application/octet-stream');
                            header('Content-Type: ' . $content_type);
                            readfile($static_file);
                            exit;
                        }
                    }
                }
            envFrom:
              - secretRef:
                  name: wordpress-secret
            lifecycle:
              postStart:
                exec:
                  command:
                    - bash
                    - -c
                    - |
                      cat << 'EOF' > /var/www/html/.htaccess
                      # BEGIN WordPress
                      <IfModule mod_rewrite.c>
                      RewriteEngine On
                      RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
                      RewriteBase /
                      RewriteRule ^index\.php$ - [L]
                      RewriteCond %{REQUEST_URI} !^/server-status
                      RewriteCond %{REQUEST_FILENAME} !-f
                      RewriteCond %{REQUEST_FILENAME} !-d
                      RewriteRule . /index.php [L]
                      </IfModule>
                      # END WordPress
                      EOF
                      chown www-data:www-data /var/www/html/.htaccess
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
          metrics:
            image:
              repository: docker.io/lusotycoon/apache-exporter
              tag: v1.1.1
            args:
              - --scrape_uri=http://localhost:80/server-status?auto
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 80
          metrics:
            port: 9117

    route:
      main:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
          gatus.io/endpoint: |
            path: /wp-login.php
        parentRefs:
          - name: external-gateway
            namespace: networking
        hostnames:
          - "${SECRET_MLM_DOMAIN_1}"
          - "${SECRET_MLM_DOMAIN_2}"
          - "${SECRET_MLM_DOMAIN_3}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: traefik-middleware-chain-no-auth
            backendRefs:
              - identifier: main
                port: http

    persistence:
      wordpress-data:
        existingClaim: "${VOLSYNC_CLAIM}"
        globalMounts:
          - path: /var/www/html/wp-content
            subPath: wp-content
          - path: /var/www/static
            subPath: static
          - path: /var/www/backup
            subPath: backup

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: system
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      sourceRef:
        kind: HelmRepository
        name: external-dns-charts
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation: # perform remediation when helm install fails
      retries: 3
  upgrade:
    remediation: # perform remediation when helm upgrade fails
      retries: 3
      remediateLastFailure: true # remediate the last failure, when no retries remain
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  values:
    interval: 2m

    sources:
      - crd
      - gateway-httproute

    provider:
      name: cloudflare

    policy: sync
    txtPrefix: "k8s."
    txtOwnerId: default
    domainFilters:
      - "${SECRET_DOMAIN}"
      - "${SECRET_MLM_DOMAIN_1}"
      - "${SECRET_MLM_DOMAIN_2}"
      - "${SECRET_MLM_DOMAIN_3}"

    podAnnotations:
      secret.reloader.stakater.com/reload: cloudflare-api-key

    resources:
      requests:
        memory: 100Mi
        cpu: 25m
      limits:
        memory: 250Mi

    env:
      - name: CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: cloudflare_email
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: cloudflare_api_token

    extraArgs:
      - --gateway-label-filter=gateway.sysinfra.pro/type=external
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --cloudflare-proxied

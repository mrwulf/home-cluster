apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app reloader
spec:
  interval: 1h
  chart:
    spec:
      chart: reloader
      version: 2.2.14
      sourceRef:
        kind: HelmRepository
        name: stakater-charts
        namespace: flux-system
      interval: 1h
  values:
    nameOverride: *app
    fullnameOverride: *app

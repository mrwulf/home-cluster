---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-middleware-pocket-id-forward-auth
spec:
  forwardAuth:
    address: http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authSignIn: https://oauth.${SECRET_DOMAIN}/oauth2/start?rd={url}
    authResponseHeaders:
      - X-Auth-User
      - X-Auth-Email
      - Authorization

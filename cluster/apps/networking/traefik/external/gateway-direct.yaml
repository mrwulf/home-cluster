---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-direct-gateway
  namespace: networking
  labels:
    gateway.sysinfra.pro/type: external
  annotations:
    external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_DOMAIN}"
    # Probe attached routes via public DNS (egress -> 1.1.1.1) so Gatus tests the
    # real external path. Inherited by all routes; per-route config wins on conflicts.
    gatus.io/endpoint: |
      group: external
      client:
        dns-resolver: "udp://1.1.1.1:53"
spec:
  gatewayClassName: traefik-external
  addresses:
    - type: IPAddress
      value: "10.0.10.20"
  listeners:
    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 8443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: "wildcard-${SECRET_DOMAIN/./-}-tls"
          - name: mlm-domains-tls

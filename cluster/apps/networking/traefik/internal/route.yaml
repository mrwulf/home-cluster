---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik-dashboard-internal
  namespace: networking
  annotations:
    gatus.io/enabled: "true"
    gatus.io/endpoint: |
      path: /dashboard/
spec:
  parentRefs:
    - name: internal-gateway
      namespace: networking
  hostnames:
    - "traefik-internal.home.${SECRET_DOMAIN}"
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rfc1918-ips
      backendRefs:
        - name: traefik-internal
          port: 8080

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal-gateway
  namespace: networking
spec:
  gatewayClassName: traefik
  addresses:
    - type: IPAddress
      value: "10.0.10.30"
  listeners:
    - name: http
      protocol: HTTP
      port: 8010
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 8450
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: "wildcard-internal-${SECRET_DOMAIN/./-}-tls"

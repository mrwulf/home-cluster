---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mlm-domains-tls
  namespace: networking
spec:
  secretName: mlm-domains-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - "${SECRET_MLM_DOMAIN_1}"
    - "${SECRET_MLM_DOMAIN_2}"
    - "${SECRET_MLM_DOMAIN_3}"

---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: internet-access-policy
spec:
  name: "Internet Access"
  sourceGroups:
    - "FullVPN Users"
  destinationGroups:
    - "Firewall Peers"

---
# ==============================================================================
# NetBird Declarative Resources & Operational Manual Assumptions
# ==============================================================================
# MANUAL DASHBOARD ASSUMPTIONS (NetBird Web Console Requirements):
# 1. SETUP KEY AUTO-GROUPS:
#    - In the NetBird Web Console (Setup Keys -> k8s-setup-key), the key MUST
#      have 'Auto-Groups' set to include 'Routing Peers'.
#    - Rationale: NetworkRouter peer pods (networkrouter-k8s-...) join via this
#      setup key. Auto-assigning 'Routing Peers' ensures that access policies
#      targeting 'destinationGroups: [routing-peers]' automatically match the
#      cluster routing peers upon registration without traffic drop.
#
# 2. ENVIRONMENT & SECRET SUBSTITUTIONS:
#    - ${SECRET_DOMAIN}: Global cluster root domain
#    - ${CORE_NFS_SERVER}: Primary NFS storage host IP
#    - ${GATEWAY_ADDR}: Default network gateway IP
#    - ${NETBIRD_NETWORK_ID:-default}: NetBird Cloud Network UUID
# ==============================================================================

# ==============================================================================
# Setup Keys (NBSetupKey)
# ==============================================================================
# NOTE: Ensure 'Auto-Groups' on this key in NetBird Console includes 'Routing Peers'.
apiVersion: netbird.io/v1
kind: NBSetupKey
metadata:
  name: k8s-setup-key
  namespace: networking
spec:
  secretKeyRef:
    name: netbird
    key: SETUP_KEY
---
apiVersion: netbird.io/v1
kind: NBSetupKey
metadata:
  name: opnsense-setup-key
  namespace: networking
spec:
  secretKeyRef:
    name: netbird
    key: OPNSENSE_SETUP_KEY
---
# ==============================================================================
# Network Routers (NetworkRouter)
# ==============================================================================
apiVersion: netbird.io/v1alpha1
kind: NetworkRouter
metadata:
  name: k8s
  namespace: networking
spec:
  dnsZoneRef:
    name: "k8s.${SECRET_DOMAIN}"
  workloadOverride:
    replicas: 2
    podTemplate:
      spec:
        containers:
          - name: netbird
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 256Mi
---
# ==============================================================================
# Declarative Peer & User Groups (NBGroup)
# ==============================================================================
apiVersion: netbird.io/v1
kind: NBGroup
metadata:
  name: all
  namespace: networking
spec:
  name: "All"
---
apiVersion: netbird.io/v1
kind: NBGroup
metadata:
  name: users
  namespace: networking
spec:
  name: "Users"
---
apiVersion: netbird.io/v1
kind: NBGroup
metadata:
  name: work
  namespace: networking
spec:
  name: "Work"
---
apiVersion: netbird.io/v1
kind: NBGroup
metadata:
  name: non-work
  namespace: networking
spec:
  name: "Non-Work"
---
apiVersion: netbird.io/v1
kind: NBGroup
metadata:
  name: admin-users
  namespace: networking
spec:
  name: "Admin Users"
---
apiVersion: netbird.io/v1
kind: NBGroup
metadata:
  name: external-users
  namespace: networking
spec:
  name: "External-Users"
# ---
# apiVersion: netbird.io/v1
# kind: NBGroup
# metadata:
#   name: routing-peers
#   namespace: networking
# spec:
#   name: "Routing Peers"
# ---
# apiVersion: netbird.io/v1
# kind: NBGroup
# metadata:
#   name: firewall-peers
#   namespace: networking
# spec:
#   name: "Firewall Peers"
# ---
# apiVersion: netbird.io/v1
# kind: NBGroup
# metadata:
#   name: fullvpn
#   namespace: networking
# spec:
#   name: "FullVPN"
---
apiVersion: netbird.io/v1
kind: NBGroup
metadata:
  name: fullvpn-users
  namespace: networking
spec:
  name: "FullVPN Users"
---
# ==============================================================================
# Declarative Network Resources (NBResource)
# ==============================================================================
# NOTE: netbird-operator automatically provisions a resource-specific access
# policy ('<Resource Name> Access') in NetBird Cloud for each NBResource.
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: public-services
  namespace: networking
  annotations:
    netbird.io/policy: "public-sites-policy"
spec:
  name: "Public Services"
  address: "*.${SECRET_DOMAIN}"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  tcpPorts:
    - 443
  groups:
    - routing-peers
  policySourceGroups:
    - "Work"
    - "Non-Work"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: private-services
  namespace: networking
  annotations:
    netbird.io/policy: "private-sites-policy"
spec:
  name: "Private Services"
  address: "*.home.${SECRET_DOMAIN}"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  tcpPorts:
    - 443
  groups:
    - routing-peers
  policySourceGroups:
    - "Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: k8s-api-access
  namespace: networking
  annotations:
    netbird.io/policy: "k8s-api-policy"
spec:
  name: "k8s.home"
  address: "10.0.10.201/32"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  tcpPorts:
    - 6443
  groups:
    - routing-peers
  policySourceGroups:
    - "Admin Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: k8s-nodes-subnet-talos
  namespace: networking
  annotations:
    netbird.io/policy: "k8s-nodes-policy"
spec:
  name: "K8s Nodes Talos Subnet"
  address: 10.0.1.51/29
  networkID: ${NETBIRD_NETWORK_ID:-default}
  groups:
    - routing-peers
  policySourceGroups:
    - "Admin Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: nas-storage
  namespace: networking
  annotations:
    netbird.io/policy: "nas-policy"
spec:
  name: "NAS Storage"
  address: "${CORE_NFS_SERVER}/32"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  tcpPorts:
    - 443
    - 7090
    - 22
  groups:
    - routing-peers
  policySourceGroups:
    - "Admin Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: firewall02
  namespace: networking
  annotations:
    netbird.io/policy: "firewall02-policy"
spec:
  name: "firewall02"
  address: "10.0.0.2/32"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  groups:
    - "Firewall Peers"
  policySourceGroups:
    - "Admin Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: firewall03
  namespace: networking
  annotations:
    netbird.io/policy: "firewall03-policy"
spec:
  name: "firewall03"
  address: "10.0.0.3/32"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  groups:
    - "Firewall Peers"
  policySourceGroups:
    - "Admin Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: firewall-active
  namespace: networking
  annotations:
    netbird.io/policy: "firewall-active-policy"
spec:
  name: "firewall-active"
  address: "${GATEWAY_ADDR}/32"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  groups:
    - "Firewall Peers"
  policySourceGroups:
    - "Admin Users"
    - "Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: external-ingress
  namespace: networking
  annotations:
    netbird.io/policy: "external-ingress-policy"
spec:
  name: "External Ingress Gateway"
  address: "10.0.10.20/32"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  tcpPorts:
    - 443
  groups:
    - routing-peers
  policySourceGroups:
    - "Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: internal-ingress
  namespace: networking
  annotations:
    netbird.io/policy: "internal-ingress-policy"
spec:
  name: "Internal Ingress Gateway"
  address: "10.0.10.30/32"
  networkID: ${NETBIRD_NETWORK_ID:-default}
  tcpPorts:
    - 443
  groups:
    - routing-peers
  policySourceGroups:
    - "Users"
    - "Admin Users"
---
apiVersion: netbird.io/v1
kind: NBResource
metadata:
  name: full-vpn-exit
  namespace: networking
  annotations:
    netbird.io/policy: "internet-access-policy"
spec:
  name: "Full VPN Internet Egress"
  address: 0.0.0.0/0
  networkID: ${NETBIRD_NETWORK_ID:-default}
  groups:
    - "Firewall Peers"
  policySourceGroups:
    - "FullVPN Users"
---
# ==============================================================================
# Declarative Access Policies (NBPolicy)
# ==============================================================================
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: k8s-api-policy
spec:
  name: "K8s API Policy"
  sourceGroups:
    - "Admin Users"
  destinationGroups:
    - routing-peers
  protocols:
    - tcp
  ports:
    - 6443
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: k8s-nodes-policy
spec:
  name: "k8s nodes Policy"
  sourceGroups:
    - "Admin Users"
  destinationGroups:
    - routing-peers
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: nas-policy
spec:
  name: "NAS Policy"
  sourceGroups:
    - "Admin Users"
  destinationGroups:
    - routing-peers
  protocols:
    - tcp
  ports:
    - 443
    - 7090
    - 22
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: firewall02-policy
spec:
  name: "firewall02 Policy"
  sourceGroups:
    - "Admin Users"
  destinationGroups:
    - "Firewall Peers"
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: firewall03-policy
spec:
  name: "firewall03 Policy"
  sourceGroups:
    - "Admin Users"
  destinationGroups:
    - "Firewall Peers"
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: firewall-active-policy
spec:
  name: "firewall-active Policy"
  sourceGroups:
    - "Admin Users"
    - "Users"
  destinationGroups:
    - "Firewall Peers"
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: external-ingress-policy
spec:
  name: "External Ingress Policy"
  sourceGroups:
    - "Users"
  destinationGroups:
    - routing-peers
  protocols:
    - tcp
  ports:
    - 443
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: internal-ingress-policy
spec:
  name: "Internal Ingress Policy"
  sourceGroups:
    - "Users"
  destinationGroups:
    - routing-peers
  protocols:
    - tcp
  ports:
    - 443
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: git-access-policy
spec:
  name: "Git Access"
  sourceGroups:
    - "Admin Users"
  destinationGroups:
    - routing-peers
  protocols:
    - tcp
  ports:
    - 22
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: public-sites-policy
spec:
  name: "Public Sites Policy"
  sourceGroups:
    - "Work"
    - "Non-Work"
  destinationGroups:
    - routing-peers
  protocols:
    - tcp
  ports:
    - 443
---
apiVersion: netbird.io/v1
kind: NBPolicy
metadata:
  name: private-sites-policy
spec:
  name: "Private Sites Policy"
  sourceGroups:
    - "Users"
  destinationGroups:
    - routing-peers
  protocols:
    - tcp

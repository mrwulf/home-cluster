#cloud-config
write_files:
  # 1. Write Rathole Server Configuration
  - path: /etc/rathole/server.toml
    permissions: '0600'
    content: |
      [server]
      bind_addr = "0.0.0.0:8080"
      token = "${RATHOLE_HANDSHAKE_TOKEN}"

      [server.services.web-secure]
      token = "${RATHOLE_SERVICE_TOKEN}"
      bind_addr = "0.0.0.0:443"
      proxy_protocol = true

  # 2. Write Systemd Service File for Rathole
  - path: /etc/systemd/system/rathole.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Rathole Server
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/rathole --server /etc/rathole/server.toml
      Restart=always
      RestartSec=3
      LimitNOFILE=1048576

      [Install]
      WantedBy=multi-user.target

runcmd:
  # 3. Download and Install Rathole Binary Natively
  # renovate: depName=rathole-org/rathole datasource=github-releases
  - apt-get update && apt-get install -y unzip
  - curl -L -o /tmp/rathole.zip https://github.com/rathole-org/rathole/releases/download/v0.5.0/rathole-x86_64-unknown-linux-gnu.zip
  - unzip -o /tmp/rathole.zip -d /usr/local/bin/
  - chmod +x /usr/local/bin/rathole
  - rm /tmp/rathole.zip

  # 4. Tune Linux TCP stack (BBR Congestion Control) for high throughput / video streaming
  - sysctl -w net.core.default_qdisc=fq
  - sysctl -w net.ipv4.tcp_congestion_control=bbr
  - echo "net.core.default_qdisc=fq" >> /etc/sysctl.conf
  - echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.conf

  # 5. Enable and start Rathole
  - systemctl daemon-reload
  - systemctl enable rathole --now

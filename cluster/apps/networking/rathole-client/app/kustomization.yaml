apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - tofu.yaml
  - helmrelease.yaml
  - external-secret.yaml
  - gitrepo.yaml
  - rbac.yaml
configMapGenerator:
  - name: rathole-client-template
    files:
      - client.toml=configs/client.toml.template
generatorOptions:
  disableNameSuffixHash: true

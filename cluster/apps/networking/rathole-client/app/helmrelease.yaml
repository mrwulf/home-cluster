apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rathole-client
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      rathole-client:
        strategy: RollingUpdate
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          template-config:
            image:
              repository: docker.io/library/alpine
              tag: 3.19
            command:
              - /bin/sh
              - -c
              - |
                # Replace placeholders in template with secret environment variables
                sed -e "s/__VPS_PUBLIC_IP__/${VPS_PUBLIC_IP}/g" \
                    -e "s/__HANDSHAKE_TOKEN__/${RATHOLE_HANDSHAKE_TOKEN}/g" \
                    -e "s/__SERVICE_TOKEN__/${RATHOLE_SERVICE_TOKEN}/g" \
                    /etc/rathole/template/client.toml > /etc/rathole/config/client.toml
                echo "=== Generated Config ==="
                cat /etc/rathole/config/client.toml
            env:
              VPS_PUBLIC_IP:
                valueFrom:
                  secretKeyRef:
                    name: rathole-vps-output
                    key: VPS_PUBLIC_IP
              RATHOLE_HANDSHAKE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: rathole-infra-secrets
                    key: rathole_handshake_token
              RATHOLE_SERVICE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: rathole-infra-secrets
                    key: rathole_service_token
        containers:
          app:
            image:
              repository: docker.io/rapiz1/rathole
              tag: v0.5.0
            args:
              - --client
              - /etc/rathole/config/client.toml
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /etc/rathole/config
      template:
        type: configMap
        name: rathole-client-template
        globalMounts:
          - path: /etc/rathole/template/client.toml
            subPath: client.toml
            readOnly: true

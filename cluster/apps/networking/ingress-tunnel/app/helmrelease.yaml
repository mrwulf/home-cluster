apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ingress-tunnel
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ingress-tunnel:
        strategy: RollingUpdate
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          template-config:
            image:
              repository: docker.io/library/alpine
              tag: 3.19
            command:
              - /bin/sh
              - -c
              - |
                # Replace placeholders in template with secret environment variables
                sed -e "s/__VPS_PUBLIC_IP__/$${VPS_PUBLIC_IP}/g" \
                    -e "s/__HANDSHAKE_TOKEN__/$${TUNNEL_HANDSHAKE_TOKEN}/g" \
                    -e "s/__POD_NAME__/$${POD_NAME}/g" \
                    /etc/tunnel/template/tunnel.toml > /etc/tunnel/config/tunnel.toml
                echo "=== Generated Config ==="
                cat /etc/tunnel/config/tunnel.toml
            env:
              POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              VPS_PUBLIC_IP:
                valueFrom:
                  secretKeyRef:
                    name: vps-tunnel-output
                    key: VPS_PUBLIC_IP
              TUNNEL_HANDSHAKE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: ingress-tunnel-secrets
                    key: tunnel_handshake_token
        containers:
          app:
            image:
              repository: docker.io/fatedier/frpc
              tag: v0.58.1
            args:
              - -c
              - /etc/tunnel/config/tunnel.toml
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /etc/tunnel/config
      template:
        type: configMap
        name: ingress-tunnel-template
        globalMounts:
          - path: /etc/tunnel/template/tunnel.toml
            subPath: tunnel.toml
            readOnly: true

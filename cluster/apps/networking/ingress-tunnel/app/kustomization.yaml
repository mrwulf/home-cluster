apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - tofu.yaml
  - helmrelease.yaml
  - external-secret.yaml
  - gitrepo.yaml
  - rbac.yaml
  - vm-static-scrape.yaml
  - vps-route.yaml
  - dashboard.yaml
configMapGenerator:
  - name: ingress-tunnel-template
    files:
      - tunnel.toml=configs/tunnel.toml.template
generatorOptions:
  disableNameSuffixHash: true

apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf-runner
  namespace: networking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-runner-binding
  namespace: networking
subjects:
  - kind: ServiceAccount
    name: tf-runner
    namespace: networking
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tf-runner-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-runner-endpoints
  namespace: networking
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-runner-endpoints-binding
  namespace: networking
subjects:
  - kind: ServiceAccount
    name: tf-runner
    namespace: networking
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-runner-endpoints

apiVersion: v1
kind: Service
metadata:
  name: frps-dashboard
  namespace: networking
spec:
  ports:
    - name: http
      port: 7500
      targetPort: 7500
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frps-dashboard
  namespace: networking
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: networking-rfc1918-ips@kubernetescrd
    gatus.io/enabled: "true"
    gatus.io/endpoint: |
      conditions:
        - "[STATUS] == 401"
spec:
  ingressClassName: traefik-internal
  tls:
    - hosts:
        - "frps-dashboard.home.${SECRET_DOMAIN}"
  rules:
    - host: "frps-dashboard.home.${SECRET_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frps-dashboard
                port:
                  number: 7500

---
apiVersion: v1
kind: Service
metadata:
  name: frps-dashboard
  namespace: networking
spec:
  type: ExternalName
  externalName: vps-direct.${SECRET_DOMAIN}
  ports:
    - name: http
      port: 7500
      targetPort: 7500
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frps-dashboard
  namespace: networking
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`frps-dashboard.home.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: frps-dashboard
          port: 7500
      middlewares:
        - name: rfc1918-ips
          namespace: networking
  tls: {}

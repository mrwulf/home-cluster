# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tdarr-server
  namespace: flux-system
  labels:
    app.kubernetes.io/name: *app
spec:
  targetNamespace: media
  dependsOn:
    - name: rook-ceph-cluster
    - name: volsync
  components:
    - ../../../../templates/volsync/primary
  interval: 1h
  path: ./cluster/apps/media/tdarr-server/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
      APP_UID: "568"
      APP_GID: "568"
      VOLSYNC_CLAIM: *app
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_NFS_START_MINUTE: "08"
      VOLSYNC_B2_START_MINUTE: "33"
  retryInterval: 2m

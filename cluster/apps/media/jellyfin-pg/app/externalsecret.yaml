---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellyfin-pg-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: jellyfin-pg-secret
    template:
      data:
        POSTGRES_HOST: &dbHost postgres17-rw.databases.svc.cluster.local
        POSTGRES_PORT: "5432"
        POSTGRES_USER: &dbUser "{{ .POSTGRES_USER }}"
        POSTGRES_PASSWORD: &dbPass "{{ .POSTGRES_PASSWORD }}"
        POSTGRES_DB: &dbname jellyfin_pg
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  data:
    - secretKey: POSTGRES_SUPER_USER
      remoteRef:
        key: "${BW_POSTGRES_SUPERUSER}"
        property: "username"
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
    - secretKey: POSTGRES_SUPER_PASS
      remoteRef:
        key: "${BW_POSTGRES_SUPERUSER}"
        property: "password"
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
    - secretKey: POSTGRES_USER
      remoteRef:
        key: "${BW_JELLYFIN_PG}"
        property: "POSTGRES_USER"
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: "${BW_JELLYFIN_PG}"
        property: "POSTGRES_PASSWORD"

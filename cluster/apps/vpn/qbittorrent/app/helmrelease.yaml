# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent

spec:
  interval: 1h

  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: kubernetes.io/hostname
                  namespaces:
                    - networking
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: pod-gateway
                      app.kubernetes.io/controller: main

        containers:
          *app :
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.3@sha256:4fcf15b7f265c2c8d7bc2a7e13240a07e0593c326f3cf3b5b9bb69eec5b79299

            env:
              TZ: "${TIMEZONE}"
              QBT_WEBUI_PORT: &port 80
              # QBT_TORRENTING_PORT: &torrentPort 50413

            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /api/v2/app/version
            #         port: *port
            #       initialDelaySeconds: 0
            #       periodSeconds: 10
            #       timeoutSeconds: 1
            #       failureThreshold: 3
            #   readiness: *probes
            #   startup:
            #     enabled: true
            #     spec:
            #       failureThreshold: 30
            #       periodSeconds: 10

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

            resources:
              requests:
                cpu: 100m
              limits:
                memory: 8Gi

    defaultPodOptions:
      annotations:
        setGateway: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 985
        runAsGroup: 977
        fsGroup: 977
        fsGroupChangePolicy: OnRootMismatch

    service:
      *app :
        controller: *app
        # type: LoadBalancer
        # annotations:
        #   lbipam.cilium.io/ips: 192.168.30.60, ::ffff:192.168.30.60
        ports:
          http:
            primary: true
            port: *port

          # bittorrent:
          #   enabled: true
          #   port: *torrentPort
          #   protocol: TCP

    route:
      *app :
        enabled: true
        annotations:
          gatus.io/enabled: "true"
        parentRefs:
          - name: internal-gateway
            namespace: networking
        hostnames:
          - "qb.home.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: rfc1918-ips
            backendRefs:
              - identifier: *app
                port: http

    persistence:
      config:
        existingClaim: ${VOLSYNC_CLAIM}

      incomplete:
        existingClaim: qbittorrent-incomplete

      downloads:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/k8s/media-downloaded"
        globalMounts:
          - path: /downloads

      others:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/OtherStorage"
        globalMounts:
          - path: /other

      tmp:
        type: emptyDir

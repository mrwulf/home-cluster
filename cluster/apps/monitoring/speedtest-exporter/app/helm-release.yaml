---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speedtest-exporter
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/miguelndecarvalho/speedtest-exporter
              tag: v3.5.4
            # env:
            #   SPEEDTEST_SERVER: "10292"
            resources:
              requests:
                cpu: 15m
                memory: 50M
              limits:
                memory: 100M
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /.config

    service:
      main:
        controller: main
        ports:
          http:
            port: 9798

    serviceMonitor:
      main:
        serviceName: main
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 30m
            scrapeTimeout: 1m
            metricRelabelings:
              - action: labeldrop
                regex: (pod)

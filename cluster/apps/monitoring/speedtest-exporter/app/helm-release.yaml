apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speedtest-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/miguelndecarvalho/speedtest-exporter
              tag: v3.5.4
            env:
              SPEEDTEST_CACHE_FOR: "1800"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 9798
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 60
                  failureThreshold: 10
            resources:
              requests:
                cpu: 15m
                memory: 50M
              limits:
                memory: 100M
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
      # Block flaky servers
      hostAliases:
        - ip: 127.0.0.1
          hostnames:
            - sd2caook.speedtest.sbcglobal.net.prod.hosts.ooklaserver.net
            - sd2caook.speedtest.sbcglobal.net
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /.config

    service:
      main:
        controller: main
        ports:
          http:
            port: 9798

    serviceMonitor:
      main:
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 30m
            scrapeTimeout: 1m
            metricRelabelings:
              - action: labeldrop
                regex: (pod)

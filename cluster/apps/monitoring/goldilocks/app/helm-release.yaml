apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app goldilocks
spec:
  interval: 1h
  chart:
    spec:
      chart: goldilocks
      version: 10.4.1
      sourceRef:
        kind: HelmRepository
        name: fairwinds-charts
        namespace: flux-system
  values:
    vpa:
      enabled: true
    dashboard:
      replicaCount: 1
      ingress:
        enabled: false

    resources:
      limits:
        memory: 32Mi
      requests:
        cpu: 25m
        memory: 32Mi

    controller:
      resources:
        requests:
          cpu: 15m
          memory: 32Mi
        limits:
          memory: 128Mi

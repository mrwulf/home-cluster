---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  parentRefs:
    - name: internal-gateway
      namespace: networking
  hostnames:
    - "blackbox.home.${SECRET_DOMAIN}"
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rfc1918-ips
      backendRefs:
        - name: blackbox-exporter
          port: 9115

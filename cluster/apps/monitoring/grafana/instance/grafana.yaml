---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
    auth:
      disable_login_form: "false"
      signout_redirect_url: "https://id.${SECRET_DOMAIN}/api/oidc/end-session?post_logout_redirect_uri=https://grafana.home.${SECRET_DOMAIN}/"
      oauth_auto_login: "true"
    auth.anonymous:
      enabled: "true"
      org_name: "Main Org."
      org_role: "Viewer"
    auth.generic_oauth:
      enabled: "true"
      name: "Pocket ID"
      scopes: "openid profile email offline_access groups"
      auth_url: "https://id.${SECRET_DOMAIN}/authorize"
      token_url: "https://id.${SECRET_DOMAIN}/api/oidc/token"
      api_url: "https://id.${SECRET_DOMAIN}/api/oidc/userinfo"
      allow_sign_up: "true"
      email_attribute_name: "email"
      role_attribute_path: "contains(groups[*], 'admin') && 'GrafanaAdmin' || 'Viewer'"
      allow_assign_grafana_admin: "true"
      use_refresh_token: "true"
      use_pkce: "true"
      send_client_credentials_via_post: "true"
    log:
      mode: "console"
    news:
      news_feed_enabled: "false"
    security:
      cookie_samesite: "lax"
      allow_embedding: "true"
    server:
      root_url: "https://grafana.home.${SECRET_DOMAIN}"
    date_formats:
      use_browser_locale: "true"
  deployment:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      template:
        spec:
          containers:
            - name: grafana
              envFrom:
                - secretRef:
                    name: grafana-oidc-credentials
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_SECURITY_ADMIN_PASSWORD
                - name: GF_INSTALL_PLUGINS
                  value: "grafana-clock-panel,grafana-piechart-panel,grafana-worldmap-panel"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
            fsGroupChangePolicy: OnRootMismatch
          volumes:
            - name: tmp
              emptyDir: {}
            - name: grafana-data
              emptyDir: {}
  disableDefaultAdminSecret: true
  disableDefaultSecurityContext: All

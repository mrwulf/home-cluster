apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector-agent
spec:
  interval: 1h
  chart:
    spec:
      chart: vector
      version: 0.56.0
      sourceRef:
        kind: HelmRepository
        name: vector-charts
        namespace: flux-system
  values:
    image:
      repository: timberio/vector
      tag: 0.56.0-debian
    role: Agent

    podAnnotations:
      configmap.reloader.stakater.com/reload: vector-agent

    customConfig:
      data_dir: /vector-data-dir

      api:
        enabled: false

      # Sources
      sources:
        kubernetes_logs:
          type: kubernetes_logs

        talos_kernel_logs:
          type: socket
          mode: udp
          address: 127.0.0.1:12000

        talos_service_logs:
          type: socket
          mode: udp
          address: 127.0.0.1:12001

        vector_metrics:
          type: internal_metrics

      # Sinks
      sinks:
        kubernetes_sink:
          type: vector
          inputs:
            - kubernetes_logs
          address: "vector-aggregator.monitoring:6000"
          version: "2"

        talos_kernel_sink:
          type: vector
          inputs:
            - talos_kernel_logs
          address: "vector-aggregator.monitoring:6050"
          version: "2"

        talos_service_sink:
          type: vector
          inputs:
            - talos_service_logs
          address: "vector-aggregator.monitoring:6051"
          version: "2"

        prometheus_sink:
          type: prometheus_exporter
          inputs:
            - vector_metrics
          address: 0.0.0.0:9090

    podMonitor:
      enabled: true
      port: prometheus-sink

    resources:
      requests:
        cpu: 23m
        memory: 256M
      limits:
        memory: 1536M

    service:
      enabled: false

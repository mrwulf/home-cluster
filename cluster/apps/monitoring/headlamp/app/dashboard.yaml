---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: headlamp
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: monitoring
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
  json: >
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "type": "datasource",
          "pluginId": "prometheus",
          "label": "Prometheus"
        }
      ],
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "schemaVersion": 39,
      "tags": ["headlamp"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "Headlamp",
      "uid": "headlamp",
      "panels": [
        {
          "title": "HTTP request rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(rate(http_server_request_count_total[5m]))",
              "legendFormat": "requests/s",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Active requests",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(http_server_active_requests)",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Plugin loads (total)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(headlamp_plugin_load_count_total)",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Cluster proxy request rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(rate(headlamp_cluster_proxy_requests_total[5m]))",
              "legendFormat": "proxy req/s",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Error rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(rate(headlamp_errors_total[5m]))",
              "legendFormat": "errors/s",
              "refId": "A"
            }
          ]
        }
      ]
    }

apiVersion: kro.run/v1alpha1
kind: NFSBackupPlan
metadata:
  name: photos
spec:
  nfs:
    path: /mnt/user/Photos
    server: ${CORE_NFS_SERVER}
  restic:
    repository: "${B2_RESTIC_REPO}:home-backups/Pictures"
    password: "${NFS_RESTIC_PWD}"
    moverMemoryRequest: 6Gi
    moverMemoryLimit: 12Gi
    b2:
      id: "${B2_ACCOUNT_ID}"
      key: "${B2_ACCOUNT_KEY}"

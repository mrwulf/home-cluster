# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: restic-rest-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: restic/rest-server
              tag: "0.14.0"
            env:
              DATA_DIRECTORY: /data
              PASSWORD_FILE: /secrets/.htpasswd
              OPTIONS: --append-only --private-repos --debug --prometheus --prometheus-no-auth
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /
            #         port: &port 8000
            #       initialDelaySeconds: 0
            #       periodSeconds: 10
            #       timeoutSeconds: 1
            #       failureThreshold: 3
            #   readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

      # Runs restic forget --prune on each device repo on the NFS share directly,
      # bypassing --append-only (which only applies to the HTTP API).
      # Schedule matches volsync's pruneIntervalDays: 10.
      prune:
        type: cronjob
        cronjob:
          schedule: "0 2 */10 * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          main:
            image:
              repository: restic/restic
              tag: "0.19.1"
            command:
              - /bin/sh
              - -c
            args:
              - |
                for dir in /data/*/; do
                  [ -d "$dir" ] || continue
                  echo ">>> Pruning $dir"
                  RESTIC_REPOSITORY="$dir" restic forget \
                    --keep-hourly 24 \
                    --keep-daily 5 \
                    --keep-weekly 4 \
                    --keep-monthly 3 \
                    --prune \
                    --verbose
                done
            env:
              RESTIC_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: restic-rest-server-secret
                    key: restic-password
              RESTIC_CACHE_DIR: /tmp/restic-cache
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 8000

    route:
      main:
        enabled: true
        annotations:
          # cloudflare-proxied must stay on the route: external-dns reads provider-specific
          # annotations only from the HTTPRoute, not the parent Gateway (unlike target).
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
          gatus.io/enabled: "true"
          gatus.io/endpoint: |
            conditions:
              - "[STATUS] == 401"
        parentRefs:
          - name: external-direct-gateway
            namespace: networking
        hostnames:
          - "backups.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: traefik-middleware-chain-no-auth
            backendRefs:
              - identifier: main
                port: http

    persistence:
      data:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/backups/restic"
        globalMounts:
          - path: /data
      secrets:
        type: secret
        name: restic-rest-server-secret
        defaultMode: 0440
        advancedMounts:
          main:
            main:
              - path: /secrets
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

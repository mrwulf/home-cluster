---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: super-productivity
spec:
  interval: 30m
  values:
    controllers:
      sync:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4
            envFrom:
              - secretRef:
                  name: super-productivity-db
          init-migrations:
            image:
              repository: ghcr.io/warreth/super-sync-server
              tag: v18.9.1
            command:
              [
                "/bin/sh",
                "-c",
                "chmod +x ./scripts/migrate-deploy.sh && ./scripts/migrate-deploy.sh",
              ]
            envFrom:
              - secretRef:
                  name: super-productivity-db

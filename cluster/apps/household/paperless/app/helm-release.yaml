---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 568
        fsGroup: 568
        supplementalGroups: [65534]
        fsGroupChangePolicy: "OnRootMismatch"

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4
            envFrom:
              - secretRef:
                  name: paperless-secret
          init-oidc:
            image:
              repository: alpine
              tag: 3.24.0
            command: ["/bin/sh", "-c"]
            args:
              - |
                cat <<EOF > /config/socialaccount_providers.json
                {
                  "openid_connect": {
                    "OAUTH_PKCE_ENABLED": true,
                    "APPS": [
                      {
                        "provider_id": "pocketid",
                        "name": "Home PocketID",
                        "client_id": "$${PAPERLESS_OIDC_CLIENT_ID}",
                        "secret": "$${PAPERLESS_OIDC_CLIENT_SECRET}",
                        "settings": {
                          "server_url": "https://id.${SECRET_DOMAIN}"
                        }
                      }
                    ],
                    "SCOPE": ["openid", "profile", "email", "groups"]
                  }
                }
                EOF
            env:
              - name: PAPERLESS_OIDC_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: paperless-oidc-credentials
                    key: PAPERLESS_OIDC_CLIENT_ID
              - name: PAPERLESS_OIDC_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: paperless-oidc-credentials
                    key: PAPERLESS_OIDC_CLIENT_SECRET
        containers:
          main:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.15
            env:
              COMPOSE_PROJECT_NAME: paperless
              PAPERLESS_CONSUMER_POLLING: "60"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              PAPERLESS_OCR_LANGUAGES: eng
              PAPERLESS_OCR_LANGUAGE: eng
              PAPERLESS_PORT: 8000
              PAPERLESS_REDIS: redis://dragonfly.databases.svc.cluster.local.:6379/2
              PAPERLESS_TASK_WORKERS: "2"
              PAPERLESS_TIME_ZONE: "${TIMEZONE}"
              PAPERLESS_URL: https://paperless.home.${SECRET_DOMAIN}
              PAPERLESS_WEBSERVER_WORKERS: "2"
              PAPERLESS_CONSUMPTION_DIR: /data/nas/consume
              PAPERLESS_DATA_DIR: /data/local/data
              PAPERLESS_EXPORT_DIR: /data/nas/export
              PAPERLESS_MEDIA_ROOT: /data/local/media
              USERMAP_GID: "568"
              PAPERLESS_TIKA_ENABLED: true
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
              PAPERLESS_TIKA_ENDPOINT: http://tika:9998
              PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
              PAPERLESS_SOCIALACCOUNT_PROVIDERS_FILE: "/config/socialaccount_providers.json"
              PAPERLESS_SOCIAL_AUTO_SIGNUP: "true"
              PAPERLESS_REDIRECT_LOGIN_TO_SSO: "false"
              PAPERLESS_SOCIAL_ACCOUNT_SYNC_GROUPS: "true"
            envFrom:
              - secretRef:
                  name: paperless-secret
            probes:
              startup:
                enabled: false

            # resources:
            #   requests:
            #     cpu: 25m
            #     memory: 3Gi
            #   limits:
            #     memory: 7Gi
            # resources:
            #   requests:
            #     cpu: 11m
            #     memory: 1812M
            #   limits:
            #     memory: 1812M

    service:
      main:
        controller: main
        ports:
          http:
            port: 8000

    route:
      main:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
        parentRefs:
          - name: internal-gateway
            namespace: networking
        hostnames:
          - "paperless.home.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: traefik-middleware-chain-internal-no-auth
            backendRefs:
              - identifier: main
                port: http

    persistence:
      data:
        existingClaim: paperless-data
        globalMounts:
          - path: /data/local/
      nas:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/k8s/paperless"
        advancedMounts:
          main:
            main:
              - subPath: incoming
                path: /data/nas/consume
              - subPath: export
                path: /data/nas/export
      config:
        type: emptyDir
        advancedMounts:
          main:
            init-oidc:
              - path: /config
            main:
              - path: /config

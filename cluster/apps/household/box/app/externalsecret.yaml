---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: box-db-init
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: box-db-init-secret
    template:
      data:
        INIT_POSTGRES_DBNAME: "box"
        INIT_POSTGRES_HOST: "postgres16-rw.databases.svc.cluster.local"
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  data:
    - secretKey: POSTGRES_SUPER_PASS
      remoteRef:
        key: "${BW_POSTGRES_SUPERUSER}"
        property: "password"
    - secretKey: POSTGRES_USER
      remoteRef:
        key: "${BW_BOX_DB_CREDENTIALS}"
        property: "username"
    - secretKey: POSTGRES_PASS
      remoteRef:
        key: "${BW_BOX_DB_CREDENTIALS}"
        property: "password"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: box
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: box-secret
    template:
      data:
        # Homebox environment variables
        HBOX_DATABASE_DRIVER: "postgres"
        HBOX_DATABASE_DATABASE: "box"
        HBOX_DATABASE_HOST: "postgres16-rw.databases.svc.cluster.local"
        HBOX_DATABASE_PORT: "5432"
        HBOX_DATABASE_USERNAME: "{{ .POSTGRES_USER }}"
        HBOX_DATABASE_PASSWORD: "{{ .POSTGRES_PASS }}"
        HBOX_DATABASE_SSL_MODE: "disable"

        # OIDC/Pocket ID variables
        HBOX_OIDC_ENABLED: "true"
        HBOX_OIDC_SCOPE: "openid profile email"
        HBOX_OIDC_AUTO_REDIRECT: "true"
        HBOX_OIDC_BUTTON_TEXT: "Sign in with Home PocketID"
        HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: "false"
        HBOX_OPTIONS_TRUST_PROXY: "true"
        HBOX_MAILER_HOST: smtp-relay.system.svc.cluster.local
        HBOX_MAILER_PORT: "2525"
        HBOX_MAILER_FROM: "box@${SECRET_DOMAIN}"
        HBOX_LOG_LEVEL: "info"
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: "${BW_BOX_DB_CREDENTIALS}"
        property: "username"
    - secretKey: POSTGRES_PASS
      remoteRef:
        key: "${BW_BOX_DB_CREDENTIALS}"
        property: "password"

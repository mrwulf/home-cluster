---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vikunja
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          dnsConfig:
            options:
              - name: ndots
                value: "1"
        initContainers:
          init-config:
            image:
              repository: alpine
              tag: 3.19.9
            command: ["/bin/sh", "-c"]
            args:
              - |
                sed -e "s|VIKUNJA_CLIENT_ID_PLACEHOLDER|$VIKUNJA_AUTH_OPENID_PROVIDERS_POCKETID_CLIENTID|g" \
                    -e "s|VIKUNJA_CLIENT_SECRET_PLACEHOLDER|$VIKUNJA_AUTH_OPENID_PROVIDERS_POCKETID_CLIENTSECRET|g" \
                    /etc/vikunja-template/config.yml > /etc/vikunja/config.yml
            envFrom:
              - secretRef:
                  name: vikunja-oidc-credentials
        containers:
          main:
            image:
              repository: caddy
              tag: 2.11.4-alpine
              pullPolicy: IfNotPresent
            resources:
              requests:
                cpu: 15m
                memory: 100M
              limits:
                memory: 1024M
          frontend:
            image:
              repository: vikunja/frontend
              tag: 0.22.1
            resources:
              requests:
                cpu: 10m
                memory: 26Mi
              limits:
                memory: 512Mi
          api:
            image:
              repository: vikunja/api
              tag: 0.22.1
            env:
              - name: VIKUNJA_SERVICE_TIMEZONE
                value: ${TIMEZONE}
              - name: VIKUNJA_DATABASE_TYPE
                value: "postgres"
              - name: VIKUNJA_DATABASE_HOST
                value: postgres-rw.databases.svc.cluster.local.
              - name: VIKUNJA_DATABASE_DATABASE
                value: vikunja
              - name: VIKUNJA_SERVICE_FRONTENDURL
                value: https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}
              - name: VIKUNJA_SERVICE_ENABLETASKCOMMENTS
                value: "false"
              - name: VIKUNJA_MAILER_FROMEMAIL
                value: lists@${SECRET_DOMAIN}
              - name: VIKUNJA_MAILER_ENABLED
                value: "true"
              - name: VIKUNJA_MAILER_HOST
                value: smtp-relay.home.svc.cluster.local
              - name: VIKUNJA_MAILER_PORT
                value: "2525"
              - name: VIKUNJA_METRICS_ENABLED
                value: "true"
              - name: &envjwt VIKUNJA_SERVICE_JWT
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: *envjwt
              - name: &envdbuser VIKUNJA_DATABASE_USER
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: *envdbuser
              - name: &envdbpass VIKUNJA_DATABASE_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: *envdbpass
            resources:
              requests:
                cpu: 15m
                memory: 24Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    route:
      main:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
        parentRefs:
          - name: external-gateway
            namespace: networking
        hostnames:
          - "lists.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: main
                port: http

    persistence:
      files:
        existingClaim: "${VOLSYNC_CLAIM}"
        advancedMounts:
          main:
            api:
              - path: /app/vikunja/files
      config-template:
        type: custom
        volumeSpec:
          configMap:
            name: vikunja
        advancedMounts:
          main:
            init-config:
              - path: /etc/vikunja-template/config.yml
                subPath: config.yml
      config:
        type: emptyDir
        advancedMounts:
          main:
            init-config:
              - path: /etc/vikunja
            api:
              - path: /etc/vikunja
      caddy-config:
        type: "custom"
        volumeSpec:
          configMap:
            name: vikunja
        advancedMounts:
          main:
            main:
              - path: /etc/caddy/Caddyfile
                subPath: Caddyfile

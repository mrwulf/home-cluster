apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          main:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.21.0
              pullPolicy: IfNotPresent

            env:
              PUID: 568
              PGID: 568
              TZ: "${TIMEZONE}"
              DEFAULT_EMAIL: "${SECRET_CLOUDFLARE_EMAIL}"
              ALLOW_SIGNUP: false
              API_PORT: 9000
              AUTO_BACKUP_ENABLED: true
              BASE_URL: https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}
              SMTP_HOST: smtp-relay.system.svc.cluster.local.
              SMTP_PORT: 2525
              SMTP_FROM_NAME: meals@${SECRET_DOMAIN}
              SMTP_AUTH_STRATEGY: none
              SMTP_FROM_EMAIL: meals@${SECRET_DOMAIN}
              TOKEN_TIME: 720
              OPENAI_BASE_URL: http://ollama.ai.svc.cluster.local:11424/v1
              OPENAI_API_KEY: ignored
              MEALIE_TRUSTED_PROXIES: "10.244.0.0/16"
              MEALIE_FORWARDED_ALLOW_IPS: "10.244.0.0/16"
              OIDC_CONFIGURATION_URL: https://id.${SECRET_DOMAIN}/.well-known/openid-configuration
              OIDC_PROVIDER_NAME: "Home PocketID"
              OIDC_ADMIN_GROUP: admin
              OIDC_CLIENT_SECRET: ""
            envFrom:
              - secretRef:
                  name: *app
              - secretRef:
                  name: mealie-oidc-credentials

            resources:
              requests:
                cpu: 10m
                memory: 411M
              limits:
                memory: 512M
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    service:
      main:
        controller: main
        ports:
          http:
            port: 9000

    route:
      main:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
        parentRefs:
          - name: external-gateway
            namespace: networking
        hostnames:
          - "${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: traefik-middleware-chain-no-auth
            backendRefs:
              - identifier: main
                port: http

    persistence:
      api-data:
        existingClaim: "${VOLSYNC_CLAIM}"
        globalMounts:
          - path: /app/data/
      backups:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/backups/mealie"
        globalMounts:
          - path: /app/data/backups
      nltk-data:
        type: emptyDir
        globalMounts:
          - path: /nltk_data
      temp:
        type: emptyDir
        globalMounts:
          - path: /tmp

# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: *app
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4
            envFrom:
              - configMapRef:
                  name: immich-configmap
              - secretRef:
                  name: immich-secret
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.3
            env:
              NODE_OPTIONS: "--max-old-space-size=8192"
              IMMICH_WORKERS_INCLUDE: "api"
            envFrom:
              - configMapRef:
                  name: immich-configmap
              - secretRef:
                  name: immich-secret
              - secretRef:
                  name: immich-oidc-credentials
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /server/ping
                    port: 3001
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /server/ping
                    port: 3001
                  failureThreshold: 180
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512M
              limits:
                memory: 8G

    service:
      main:
        controller: main
        ports:
          http:
            port: 3001

    route:
      main:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
          # cloudflare-proxied must stay on the route: external-dns reads provider-specific
          # annotations only from the HTTPRoute, not the parent Gateway (unlike target).
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        parentRefs:
          - name: external-direct-gateway
            namespace: networking
        hostnames:
          - "photos.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: traefik-middleware-chain-direct
            backendRefs:
              - identifier: main
                port: http

    persistence:
      library:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/Photos/immich"
        globalMounts:
          - path: /usr/src/app/upload
      memories:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/Photos"
        globalMounts:
          - path: /mnt/memories

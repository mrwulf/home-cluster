---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: immich
spec:
  name: Immich
  launchUrl: https://photos.${SECRET_DOMAIN}/
  clientSecretRotation:
    enabled: false
  callbackUrls:
    - app.immich:///oauth-callback
    - https://photos.${SECRET_DOMAIN}/auth/login
    - https://photos.${SECRET_DOMAIN}/user-settings
  logoutCallbackUrls:
    - https://photos.${SECRET_DOMAIN}/
  allowedUserGroups:
    - name: users
      namespace: auth
  secret:
    name: immich-oidc-credentials
    keys:
      clientID: OAUTH_CLIENT_ID
      clientSecret: OAUTH_CLIENT_SECRET

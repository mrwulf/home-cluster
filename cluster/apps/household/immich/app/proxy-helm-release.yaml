---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-proxy
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      *app :
        replicas: 2
        pod:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: *app
        containers:
          app:
            image:
              repository: alangrainger/immich-public-proxy
              tag: 2.1.1
            env:
              IMMICH_URL: http://immich-server.household.svc.cluster.local:3001
              showHomePage: false
            resources:
              requests:
                cpu: 100m
                memory: 250Mi
    service:
      main:
        controller: *app
        ports:
          http:
            port: 3000
    route:
      main:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
          gatus.io/endpoint: |
            group: external
            client:
              dns-resolver: "udp://10.0.0.1:53053"
        parentRefs:
          - name: external-gateway
            namespace: networking
        hostnames:
          - "photo-share.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: traefik-middleware-chain-no-auth
            backendRefs:
              - identifier: main
                port: http

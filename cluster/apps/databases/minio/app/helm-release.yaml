apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minio
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: *app
              topologyKey: "kubernetes.io/hostname"
    controllers:
      minio:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        # pod:
        #   securityContext:
        #     runAsUser: 568
        #     runAsGroup: 568
        #     fsGroup: 568
        #     fsGroupChangePolicy: "OnRootMismatch"
        #     supplementalGroups:
        #       - 100
        #       - 65539
        containers:
          main:
            image:
              repository: quay.io/minio/minio
              tag: RELEASE.2025-01-20T14-49-07Z
            env:
              TZ: "${TIMEZONE}"
              MINIO_UPDATE: "off"
              MINIO_PROMETHEUS_URL: http://vmsingle-stack.monitoring.svc.cluster.local:8428
              MINIO_PROMETHEUS_JOB_ID: minio
              MINIO_PROMETHEUS_AUTH_TYPE: public
              MINIO_BROWSER_REDIRECT_URL: "https://minio.home.${SECRET_DOMAIN}"
              MINIO_SERVER_URL: "https://cdn.${SECRET_DOMAIN}"
              MINIO_IDENTITY_OPENID_CONFIG_URL: "https://id.${SECRET_DOMAIN}/.well-known/openid-configuration"
              MINIO_IDENTITY_OPENID_SCOPES: "openid,profile,email"
              MINIO_IDENTITY_OPENID_REDIRECT_URI: "https://minio.home.${SECRET_DOMAIN}/oauth_callback"
              MINIO_IDENTITY_OPENID_ROLE_POLICY: "consoleAdmin"
              MINIO_IDENTITY_OPENID_DISPLAY_NAME: "Home PocketID"
            envFrom:
              - secretRef:
                  name: minio-secret
              - secretRef:
                  name: minio-oidc-credentials
            args: ["server", "/data", "--console-address", ":9001"]
            resources:
              requests:
                memory: 100Mi
                cpu: 100m
              limits:
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /minio/health/live
                    port: &api-port 9000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes

    service:
      minio:
        controller: minio
        ports:
          http:
            port: &console-port 9001
          api:
            enabled: true
            port: *api-port

    # https://min.io/docs/minio/linux/reference/minio-mc-admin/mc-admin-prometheus.html
    serviceMonitor:
      main:
        serviceName: minio
        endpoints:
          - port: api
            scheme: http
            path: /minio/metrics/v3
            interval: 1m
            scrapeTimeout: 10s
            # bearerTokenSecret:
            #   name: minio-secret
            #   key: MINIO_PROMETHEUS_TOKEN

    route:
      dashboard:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
        parentRefs:
          - name: internal-gateway
            namespace: networking
        hostnames:
          - "minio.home.${SECRET_DOMAIN}"
        rules:
          - filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: rfc1918-ips
            backendRefs:
              - identifier: minio
                port: *console-port
      s3:
        enabled: true
        annotations:
          gatus.io/enabled: "true"
          gatus.io/endpoint: |
            path: /minio/health/live
        parentRefs:
          - name: external-gateway
            namespace: networking
        hostnames:
          - "cdn.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: minio
                port: api

    persistence:
      config:
        type: nfs
        server: "${CORE_NFS_SERVER:=nas0}"
        path: "/mnt/user/Objects"
        globalMounts:
          - path: /data

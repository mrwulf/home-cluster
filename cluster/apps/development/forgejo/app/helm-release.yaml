---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    image:
      repository: forgejo/forgejo
      tag: 15.0.2-rootless
    gitea:
      config:
        APP_NAME: "Forgejo Git Service"
        RUN_MODE: prod
        oauth2_client:
          ENABLE: true
        webhook:
          ALLOWED_HOST_LIST: "external,loopback,*.svc.cluster.local,*.${SECRET_DOMAIN}"
        database:
          DB_TYPE: postgres
          HOST: postgres16-rw.databases.svc.cluster.local:5432
          NAME: forgejo
        server:
          DOMAIN: "git.home.${SECRET_DOMAIN}"
          ROOT_URL: "https://git.home.${SECRET_DOMAIN}/"
          SSH_DOMAIN: "git.home.${SECRET_DOMAIN}"
          SSH_PORT: 22
          SSH_LISTEN_PORT: 22
        mailer:
          ENABLED: true
          PROTOCOL: smtp
          SMTP_ADDR: smtp-relay.system.svc.cluster.local
          SMTP_PORT: 2525
          FROM: "forgejo@${SECRET_DOMAIN}"
          USER: ""
          PASSWD: ""
          FORCE_TRUST_SERVER_CERT: true
        auth:
          ENABLE_AUTO_REGISTRATION: true
          DISABLE_REGISTRATION: true # Set to true if you only want Home PocketID logins
        security:
          INSTALL_LOCK: true
      oauth:
        - name: "pocket-id"
          provider: "openidConnect"
          existingSecret: "forgejo-oidc-credentials"
          autoDiscoverUrl: "https://id.${SECRET_DOMAIN}/.well-known/openid-configuration"
      additionalConfigFromEnvs:
        - name: GITEA__database__USER
          valueFrom:
            secretKeyRef:
              name: forgejo-db
              key: FORGEJO_DATABASE_USER
        - name: GITEA__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db
              key: FORGEJO_DATABASE_PASSWORD
    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 22
    ingress:
      enabled: false
    httpRoute:
      enabled: true
      annotations:
        gatus.io/enabled: "true"
      parentRefs:
        - name: internal-gateway
          namespace: networking
      hostnames:
        - "git.home.${SECRET_DOMAIN}"
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: rfc1918-ips
    persistence:
      enabled: true
      create: false
      claimName: "${VOLSYNC_CLAIM}"
    postgresql:
      enabled: false
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: forgejo
                namespace: development
                annotations:
                  reloader.stakater.com/auto: "true"

              spec:
                template:
                  spec:
                    initContainers:
                      - name: init-db
                        image: ghcr.io/home-operations/postgres-init:18.4
                        envFrom:
                          - secretRef:
                              name: forgejo-db

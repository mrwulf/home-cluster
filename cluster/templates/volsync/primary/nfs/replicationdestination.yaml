---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}-nfs-dst"
spec:
  trigger:
    manual: restore-once
  restic:
    moverResources:
      requests:
        cpu: "${VOLSYNC_MOVER_CPU_REQUEST:-100m}"
        memory: "${VOLSYNC_MOVER_MEMORY_REQUEST:-256Mi}"
      limits:
        memory: "${VOLSYNC_MOVER_MEMORY_LIMIT:-1Gi}"
    copyMethod: "${VOLSYNC_COPY_METHOD:-Snapshot}"
    paused: "${VOLSYNC_PAUSE_RESTORE:-false}"
    ### Source (backup repository)
    repository: ${APP}-volsync-nfs
    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:-csi-ceph-block}" # same as source
    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:-1Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:-openebs-hostpath}"
    cacheAccessModes: ["${VOLSYNC_CACHE_ACCESSMODES:-ReadWriteOnce}"]
    ### Destination (PVC-to-be-restored)
    # destinationPVC: "${VOLSYNC_CLAIM}"
    storageClassName: "${VOLSYNC_STORAGECLASS:-ceph-block}"
    accessModes: ["${VOLSYNC_ACCESSMODES:-ReadWriteOnce}"]
    capacity: "${VOLSYNC_CAPACITY:-1Gi}"
    moverSecurityContext:
      runAsUser: ${APP_UID:-568}
      runAsGroup: ${APP_GID:-568}
      fsGroup: ${APP_GID:-568}
      fsGroupChangePolicy: "OnRootMismatch"
    # enableFileDeletion: true
    cleanupCachePVC: true
    cleanupTempPVC: true

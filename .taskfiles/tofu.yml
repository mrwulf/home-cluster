---
version: "3"

tasks:
  plan:
    desc: Run a local OpenTofu plan using dynamically fetched secrets and state
    dir: "{{.PROJECT_DIR}}/cluster/apps/networking/ingress-tunnel"
    cmds:
      # 1. Download and decompress active state file from Kubernetes secret
      - kubectl get secret -n networking tfstate-default-ingress-tunnel-infra -o jsonpath='{.data.tfstate}' | base64 -d | gunzip > terraform.tfstate
      # 2. Run plan with dynamically populated variables
      - |
        export KUBECONFIG="$HOME/.kube/config"
        export KUBE_CONFIG_PATH="$HOME/.kube/config"
        export TF_VAR_CLOUDFLARE_APIKEY="$(kubectl get secret -n networking cloudflare-ddns -o jsonpath='{.data.CLOUDFLARE_APIKEY}' | base64 -d)"
        export TF_VAR_hcloud_token="$(kubectl get secret -n networking ingress-tunnel-secrets -o jsonpath='{.data.hcloud_token}' | base64 -d)"
        export TF_VAR_tunnel_handshake_token="$(kubectl get secret -n networking ingress-tunnel-secrets -o jsonpath='{.data.tunnel_handshake_token}' | base64 -d)"
        export TF_VAR_smtp_server="$(kubectl get secret -n networking ingress-tunnel-secrets -o jsonpath='{.data.smtp_server}' | base64 -d)"
        export TF_VAR_smtp_username="$(kubectl get secret -n networking ingress-tunnel-secrets -o jsonpath='{.data.smtp_username}' | base64 -d)"
        export TF_VAR_smtp_password="$(kubectl get secret -n networking ingress-tunnel-secrets -o jsonpath='{.data.smtp_password}' | base64 -d)"
        export TF_VAR_secret_domain="$(sops --decrypt {{.PROJECT_DIR}}/cluster/flux/meta/cluster-secrets.sops.yaml | yq eval '.stringData.SECRET_DOMAIN' -)"
        export TUNNEL_ID="$(sops --decrypt {{.PROJECT_DIR}}/cluster/flux/meta/cluster-secrets.sops.yaml | yq eval '.stringData.SECRET_CLOUDFLARE_TUNNEL_ID' -)"
        export TF_VAR_cloudflare_tunnel_cname="${TUNNEL_ID}.cfargotunnel.com"
        tofu plan
    defer:
      # Cleanup state file on exit
      - rm -f terraform.tfstate

  list-locks:
    desc: List all locked Terraform resources across the cluster
    cmds:
      - |
        LOCKS=$(kubectl get terraform -A -o json | jq -r '.items[] | select(.status.lock != null and .status.lock != {}) | "\(.metadata.namespace)/\(.metadata.name)\t\(.status.lock.lastApplied // .status.lock.pending // "N/A")"')
        if [ -z "$LOCKS" ]; then
          echo "No locked Terraform states found."
        else
          echo -e "NAMESPACE/NAME\tLOCK_ID"
          echo -e "$LOCKS"
        fi

  unlock:
    desc: Force unlock a Terraform state directly in the cluster
    vars:
      NAME: '{{.NAME | default "ingress-tunnel-infra"}}'
      NS: '{{.NS | default "networking"}}'
      LOCK_ID: "{{.LOCK_ID}}"
    cmds:
      - |
        if [ -z "{{.LOCK_ID}}" ]; then
          echo "Error: LOCK_ID is required."
          echo "Usage: task tofu:unlock LOCK_ID=<lock-id> [NAME=ingress-tunnel-infra] [NS=networking]"
          exit 1
        fi
        echo "Applying force-unlock patch to Terraform CR {{.NS}}/{{.NAME}}..."
        kubectl patch terraform "{{.NAME}}" -n "{{.NS}}" --type merge -p '{"spec":{"tfstate":{"forceUnlock":"yes","lockIdentifier":"{{.LOCK_ID}}","lockTimeout":"0s"}}}'

        echo "Waiting for state lock to be released..."
        for i in {1..30}; do
          LOCKED=$(kubectl get terraform "{{.NAME}}" -n "{{.NS}}" -o jsonpath='{.status.conditions[?(@.type=="StateLocked")].status}')
          if [ "$LOCKED" != "True" ]; then
            echo "State lock successfully released!"
            break
          fi
          echo -n "."
          sleep 2
        done

        echo "Removing force-unlock block from Terraform CR..."
        kubectl patch terraform "{{.NAME}}" -n "{{.NS}}" --type merge -p '{"spec":{"tfstate":null}}'
